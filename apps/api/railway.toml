# Railway service: api
# Root directory in Railway dashboard: apps/api

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = [
  "/apps/api/**"
]

[deploy]
# healthcheckPath intentionally omitted — the worker service runs Celery,
# which has no HTTP server. Railway will use process-level health checks instead.
# The jobscout-ai (API) service keeps its /health endpoint via the Railway UI override.
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
