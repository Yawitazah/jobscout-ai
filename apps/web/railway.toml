# Railway service: web
# Root directory in Railway dashboard: /
# Config file path in Railway dashboard: /apps/web/railway.toml

[build]
builder = "NIXPACKS"
buildCommand = "pnpm --filter web build"
watchPatterns = [
  "/apps/web/**",
  "/packages/**",
  "/package.json",
  "/pnpm-lock.yaml",
  "/pnpm-workspace.yaml"
]

[deploy]
startCommand = "pnpm --filter web start -- -H 0.0.0.0 -p ${PORT:-3000}"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
