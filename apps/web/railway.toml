# Railway service: web
# Root directory in Railway dashboard: apps/web

[build]
builder = "NIXPACKS"
buildCommand = "cd ../.. && pnpm install && pnpm --filter web build"
watchPatterns = [
  "/apps/web/**",
  "/packages/**",
  "/package.json",
  "/pnpm-lock.yaml",
  "/pnpm-workspace.yaml"
]

[deploy]
startCommand = "pnpm --filter web start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
