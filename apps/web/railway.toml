# Railway service: web
# Root directory in Railway dashboard: /
# Config file path in Railway dashboard: /apps/web/railway.toml

[build]
builder = "NIXPACKS"
buildCommand = "pnpm --filter web build"
watchPatterns = [
  "/apps/web/**",
  "/packages/**",
  "/package.json",
  "/pnpm-lock.yaml",
  "/pnpm-workspace.yaml",
  "/nixpacks.toml",
  "/.nvmrc"
]

[deploy]
startCommand = "pnpm --filter web start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
